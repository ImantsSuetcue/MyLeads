<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zielprofil - MyLeads</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/api.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div class="page" x-data="targetProfilePage()" x-init="init()">
    <div class="top-nav">
      <div>
        <a href="app.html" class="link-row" style="margin:0; text-align:left;">&larr; Zurück zur Übersicht</a>
        <h1 style="margin:0.25rem 0 0;" x-text="profile ? profile.name : 'Lädt…'"></h1>
      </div>
      <button class="btn-primary" style="margin:0;" :disabled="searching" @click="startSearch()">
        <span x-text="searching ? 'Suche läuft…' : (searchRuns.length ? 'Suche wiederholen' : 'Suche starten')"></span>
      </button>
    </div>

    <div class="card" x-show="profile" style="margin-bottom:1.5rem;">
      <p class="subtitle" x-text="profile && profile.product_description"></p>
      <p class="plan-meta" style="margin:0;">
        Zielgruppe: <span x-text="(profile && profile.target_audience) || '–'"></span> &middot;
        Region: <span x-text="(profile && profile.region) || '–'"></span> &middot;
        Branche: <span x-text="(profile && profile.industry) || '–'"></span> &middot;
        Rolle: <span x-text="(profile && profile.contact_role) || '–'"></span>
      </p>
    </div>

    <div class="error-box" x-show="error" x-text="error"></div>

    <h2>Suchverlauf</h2>
    <div class="card" style="margin-bottom:1.5rem; overflow-x:auto;" x-show="searchRuns.length">
      <table style="width:100%; border-collapse:collapse; font-size:0.9rem;">
        <thead>
          <tr style="text-align:left; border-bottom:1px solid var(--color-border);">
            <th style="padding:0.4rem;">Datum</th>
            <th style="padding:0.4rem;">Status</th>
            <th style="padding:0.4rem;">Leads</th>
            <th style="padding:0.4rem;">Firmen</th>
            <th style="padding:0.4rem;">Zusammenfassung</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="run in searchRuns" :key="run.id">
            <tr style="cursor:pointer; border-bottom:1px solid var(--color-border);"
                :style="run.id === selectedRunId ? 'background:#eef1fd;' : ''"
                @click="selectRun(run.id)">
              <td style="padding:0.4rem;" x-text="run.started_at"></td>
              <td style="padding:0.4rem;">
                <span class="badge" :class="run.status === 'completed' ? 'badge-active' : 'badge-pending'" x-text="run.status"></span>
              </td>
              <td style="padding:0.4rem;" x-text="run.leads_found_count"></td>
              <td style="padding:0.4rem;" x-text="run.companies_found_count"></td>
              <td style="padding:0.4rem;" x-text="runSummary(run)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <p class="subtitle" x-show="!searchRuns.length">Noch keine Suche gestartet.</p>

    <h2>Leads <span x-show="selectedRunId" class="plan-meta">(aus ausgewähltem Suchlauf)</span></h2>
    <div class="card" style="overflow-x:auto;" x-show="leads.length">
      <table style="width:100%; border-collapse:collapse; font-size:0.9rem;">
        <thead>
          <tr style="text-align:left; border-bottom:1px solid var(--color-border);">
            <th style="padding:0.4rem;">Firma</th>
            <th style="padding:0.4rem;">Person</th>
            <th style="padding:0.4rem;">Rolle</th>
            <th style="padding:0.4rem;">E-Mail</th>
            <th style="padding:0.4rem;">Begründung</th>
            <th style="padding:0.4rem;">Fit</th>
            <th style="padding:0.4rem;">Status</th>
            <th style="padding:0.4rem;">Datum</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="lead in leads" :key="lead.id">
            <tr style="border-bottom:1px solid var(--color-border); vertical-align:top; cursor:pointer;"
                @click="openLead(lead.id)" title="Für Details klicken">
              <td style="padding:0.4rem;">
                <strong x-text="lead.company_name"></strong><br />
                <span class="plan-meta" x-text="lead.company_domain"></span>
              </td>
              <td style="padding:0.4rem;" x-text="(lead.first_name || '') + ' ' + (lead.last_name || '')"></td>
              <td style="padding:0.4rem;" x-text="lead.job_title || '–'"></td>
              <td style="padding:0.4rem;" x-text="lead.email || '–'"></td>
              <td style="padding:0.4rem; max-width:320px;" x-text="lead.ai_reasoning || '–'"></td>
              <td style="padding:0.4rem;">
                <span class="badge" :class="'badge-' + (lead.score === 'high' ? 'active' : 'pending')" x-text="lead.score || '–'"></span>
              </td>
              <td style="padding:0.4rem;" x-text="lead.status"></td>
              <td style="padding:0.4rem;" x-text="lead.created_at"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <p class="subtitle" x-show="!leads.length && searchRuns.length">Für diesen Suchlauf wurden noch keine Leads geladen.</p>
  </div>

  <script>
    function targetProfilePage() {
      return {
        profileId: new URLSearchParams(window.location.search).get('id'),
        profile: null,
        searchRuns: [],
        leads: [],
        selectedRunId: null,
        searching: false,
        error: '',

        async init() {
          if (!auth.isLoggedIn()) {
            window.location.href = 'login.html';
            return;
          }
          if (!this.profileId) {
            this.error = 'Kein Zielprofil ausgewählt.';
            return;
          }
          await this.loadProfile();
          await this.loadSearchRuns();
        },

        async loadProfile() {
          try {
            const data = await apiFetch(`/target-profiles/${this.profileId}`);
            this.profile = data.targetProfile;
          } catch (err) {
            this.error = err.message;
          }
        },

        async loadSearchRuns() {
          try {
            const data = await apiFetch(`/target-profiles/${this.profileId}/searches`);
            this.searchRuns = data.searchRuns;
            if (this.searchRuns.length) {
              await this.selectRun(this.searchRuns[0].id);
            }
          } catch (err) {
            this.error = err.message;
          }
        },

        async selectRun(runId) {
          this.selectedRunId = runId;
          try {
            const data = await apiFetch(`/target-profiles/${this.profileId}/leads?searchRunId=${runId}`);
            this.leads = data.leads;
          } catch (err) {
            this.error = err.message;
          }
        },

        async startSearch() {
          this.error = '';
          this.searching = true;
          try {
            await apiFetch(`/target-profiles/${this.profileId}/searches`, { method: 'POST' });
            await this.loadSearchRuns();
          } catch (err) {
            this.error = err.message;
          } finally {
            this.searching = false;
          }
        },

        runSummary(run) {
          try {
            return JSON.parse(run.criteria_json || '{}').summary || '';
          } catch (err) {
            return '';
          }
        },

        openLead(leadId) {
          window.location.href = `lead-detail.html?profileId=${this.profileId}&leadId=${leadId}`;
        },
      };
    }
  </script>
</body>
</html>
