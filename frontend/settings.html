<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Einstellungen - MyLeads</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/api.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div class="app-shell" x-data="settingsPage()" x-init="init()">
    <aside class="sidebar">
      <div>
        <div class="sidebar-brand">MyLeads</div>
        <nav class="sidebar-nav">
          <a href="dashboard.html">Dashboard</a>
          <a href="app.html">Suchanfragen</a>
          <a href="leads.html">Leads</a>
          <a href="team.html">Team</a>
          <a href="settings.html">Einstellungen</a>
        </nav>
      </div>
      <div class="sidebar-footer">
        <span class="user-email" x-text="user && user.email"></span>
        <button class="btn-ghost" style="width:100%;" @click="logout()">Logout</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="page">
        <h1>Einstellungen</h1>

        <div class="card" x-show="organization" style="margin-bottom:1.5rem;">
          <p style="margin:0 0 0.35rem;">
            Plan: <strong x-text="organization && organization.plan"></strong> &middot;
            <span class="badge" :class="organization && organization.subscription_status === 'active' ? 'badge-active' : 'badge-pending'"
                  x-text="organization && organization.subscription_status"></span>
          </p>
          <p class="plan-meta" style="margin:0;">Lizenzen: <span x-text="organization && organization.license_count"></span></p>
        </div>

        <div class="card">
          <p class="subtitle" style="margin:0 0 0.5rem;">
            Abo wechseln, Lizenzen dazubuchen und das Stripe Billing Portal öffnen kommt in Phase 3.
          </p>
          <p class="subtitle" style="margin:0;">
            Bis dahin lässt sich der Plan direkt in der Datenbank bzw. über die Platform-Admin-API anpassen.
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/sidebar.js"></script>
  <script>
    function settingsPage() {
      return {
        user: null,
        organization: null,
        async init() {
          if (!auth.isLoggedIn()) {
            window.location.href = 'login.html';
            return;
          }
          try {
            const me = await apiFetch('/auth/me');
            this.user = me.user;
            this.organization = me.organization;
          } catch (err) {
            // Non-fatal on a placeholder page.
          }
        },
        logout() {
          auth.clearToken();
          window.location.href = 'login.html';
        },
      };
    }
  </script>
</body>
</html>
