<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - MyLeads</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/api.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div class="app-shell" x-data="dashboardPage()" x-init="init()">
    <aside class="sidebar">
      <div>
        <div class="sidebar-brand">MyLeads</div>
        <nav class="sidebar-nav">
          <a href="dashboard.html">Dashboard</a>
          <a href="app.html">Suchanfragen</a>
          <a href="leads.html">Leads</a>
          <a href="team.html">Team</a>
          <a href="settings.html">Einstellungen</a>
        </nav>
      </div>
      <div class="sidebar-footer">
        <span class="user-email" x-text="user && user.email"></span>
        <button class="btn-ghost" style="width:100%;" @click="logout()">Logout</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="page">
        <h1>Dashboard</h1>
        <p class="subtitle" x-show="!loading && !isPlatformAdmin">Willkommen zurück! Hier ist der aktuelle Stand deiner Lead-Suche.</p>

        <template x-if="loading">
          <div class="stat-grid">
            <div class="skeleton skeleton-row"></div>
            <div class="skeleton skeleton-row"></div>
            <div class="skeleton skeleton-row"></div>
          </div>
        </template>

        <div class="error-box" x-show="error" x-text="error"></div>

        <template x-if="!loading && isPlatformAdmin">
          <div class="card">
            <h2 style="margin-top:0;">Platform-Admin</h2>
            <p class="subtitle" style="margin:0;">
              Der Platform-Admin-Bereich (<code>/platform-admin</code>) wird erst in Phase 3 gebaut.
              Das Backend dafür funktioniert schon.
            </p>
          </div>
        </template>

        <template x-if="!loading && !isPlatformAdmin">
          <div>
            <div class="card" style="margin-bottom:1.5rem;">
              <p style="margin:0 0 0.35rem;">Eingeloggt als <strong x-text="user && user.email"></strong> (<span x-text="user && user.role"></span>)</p>
              <template x-if="organization">
                <p style="margin:0;">
                  Firma: <strong x-text="organization.name"></strong> &middot; Plan: <span x-text="organization.plan"></span>
                  &middot;
                  <span class="badge" :class="organization.subscription_status === 'active' ? 'badge-active' : 'badge-pending'"
                        x-text="organization.subscription_status"></span>
                </p>
              </template>
            </div>

            <template x-if="isManager && kpis">
              <div>
                <div class="stat-grid">
                  <div class="stat-card" :class="{active: expandedMetric === 'leadsFound'}" @click="toggleMetric('leadsFound')">
                    <div class="stat-label">Gefundene Leads</div>
                    <div class="stat-value" x-text="kpis.leadsFound"></div>
                  </div>
                  <div class="stat-card" :class="{active: expandedMetric === 'companiesFound'}" @click="toggleMetric('companiesFound')">
                    <div class="stat-label">Gefundene Unternehmen</div>
                    <div class="stat-value" x-text="kpis.companiesFound"></div>
                  </div>
                  <div class="stat-card" :class="{active: expandedMetric === 'companiesWithContact'}" @click="toggleMetric('companiesWithContact')">
                    <div class="stat-label">Unternehmen mit Ansprechpartner</div>
                    <div class="stat-value" x-text="kpis.companiesWithContact"></div>
                  </div>
                  <div class="stat-card" :class="{active: expandedMetric === 'leadsWithEmail'}" @click="toggleMetric('leadsWithEmail')">
                    <div class="stat-label">Leads mit E-Mail</div>
                    <div class="stat-value" x-text="kpis.leadsWithEmail"></div>
                  </div>
                  <div class="stat-card" :class="{active: expandedMetric === 'leadsWithPhone'}" @click="toggleMetric('leadsWithPhone')">
                    <div class="stat-label">Leads mit Telefondurchwahl</div>
                    <div class="stat-value" x-text="kpis.leadsWithPhone"></div>
                  </div>
                  <div class="stat-card" :class="{active: expandedMetric === 'targetProfiles'}" @click="toggleMetric('targetProfiles')">
                    <div class="stat-label">Zielprofile</div>
                    <div class="stat-value" x-text="targetProfiles.length"></div>
                  </div>
                </div>

                <div class="card" x-show="expandedMetric" x-transition style="margin-top:1rem;">
                  <div class="top-nav" style="margin-bottom:1rem;">
                    <div>
                      <h2 style="margin:0;" x-text="metricLabels[expandedMetric]"></h2>
                      <p class="plan-meta" style="margin:0.25rem 0 0;" x-show="currentTotal !== null">
                        <strong x-text="currentTotal"></strong> gesamt
                        <span x-show="delta !== null" x-text="' · ' + (delta >= 0 ? '+' : '') + delta + ' im gewählten Zeitraum'"></span>
                      </p>
                    </div>
                    <button class="btn-ghost" @click="toggleMetric(expandedMetric)">Schließen</button>
                  </div>

                  <div style="display:flex; gap:0.4rem; margin-bottom:1rem; flex-wrap:wrap;">
                    <template x-for="r in ranges" :key="r.key">
                      <button class="range-btn" :class="{active: metricRange === r.key}" @click="selectRange(r.key)" x-text="r.label"></button>
                    </template>
                  </div>

                  <div class="chart-wrap">
                    <canvas x-ref="metricChart"></canvas>
                  </div>

                  <div style="margin-top:1.25rem;" x-show="breakdown.length">
                    <label style="margin-top:0;">Nach Zielprofil</label>
                    <template x-for="item in breakdown" :key="item.id">
                      <div style="display:flex; justify-content:space-between; padding:0.4rem 0; border-bottom:1px solid var(--color-border-subtle); font-size:0.875rem;">
                        <span x-text="item.name"></span>
                        <strong x-text="item.value"></strong>
                      </div>
                    </template>
                  </div>
                </div>

                <h2>Status-Verteilung</h2>
                <div class="card" style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                  <template x-for="statusKey in Object.keys(kpis.statusDistribution)" :key="statusKey">
                    <span class="badge" :class="'badge-status-' + statusKey">
                      <span x-text="statusKey + ': ' + kpis.statusDistribution[statusKey]"></span>
                    </span>
                  </template>
                  <p class="subtitle" style="margin:0;" x-show="!Object.keys(kpis.statusDistribution).length">Noch keine Leads.</p>
                </div>
              </div>
            </template>

            <template x-if="!isManager">
              <div class="stat-grid">
                <div class="stat-card">
                  <div class="stat-label">Zielprofile (freigeschaltet)</div>
                  <div class="stat-value" x-text="targetProfiles.length"></div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">Leads (freigeschaltet)</div>
                  <div class="stat-value" x-text="leads.length"></div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">Leads mit E-Mail</div>
                  <div class="stat-value" x-text="leads.filter(l => l.email).length"></div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">Hohe Passung</div>
                  <div class="stat-value" x-text="leads.filter(l => l.score === 'high').length"></div>
                </div>
              </div>
            </template>

            <div class="top-nav" style="margin-top:2rem;">
              <h2 style="margin:0;">Zuletzt angelegte Zielprofile</h2>
              <a href="new-search.html"><button class="btn-primary" style="margin:0;">+ Neues Zielprofil</button></a>
            </div>

            <p class="subtitle" x-show="!targetProfiles.length">Noch keine Zielprofile angelegt.</p>

            <div class="card" x-show="targetProfiles.length">
              <template x-for="profile in targetProfiles.slice(0, 5)" :key="profile.id">
                <a :href="'target-profile.html?id=' + profile.id" style="display:block; padding:0.75rem 0; border-bottom:1px solid var(--color-border-subtle); text-decoration:none; color:inherit;">
                  <strong x-text="profile.name"></strong>
                  <p class="plan-meta" style="margin:0.25rem 0 0;" x-text="profile.product_description"></p>
                </a>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <script src="js/sidebar.js"></script>
  <script>
    function dashboardPage() {
      return {
        user: null,
        organization: null,
        targetProfiles: [],
        leads: [],
        kpis: null,
        isPlatformAdmin: false,
        isManager: false,
        loading: true,
        error: '',

        expandedMetric: null,
        metricRange: '30d',
        timeseries: [],
        breakdown: [],
        chartInstance: null,
        loadingDetail: false,
        ranges: [
          { key: '1d', label: '1 Tag' },
          { key: '7d', label: '1 Woche' },
          { key: '30d', label: '1 Monat' },
          { key: '1y', label: '1 Jahr' },
          { key: '3y', label: '3 Jahre' },
        ],
        metricLabels: {
          leadsFound: 'Gefundene Leads',
          companiesFound: 'Gefundene Unternehmen',
          companiesWithContact: 'Unternehmen mit Ansprechpartner',
          leadsWithEmail: 'Leads mit E-Mail',
          leadsWithPhone: 'Leads mit Telefondurchwahl',
          targetProfiles: 'Zielprofile',
        },

        get currentTotal() {
          return this.timeseries.length ? this.timeseries[this.timeseries.length - 1].value : null;
        },
        get delta() {
          return this.timeseries.length ? this.timeseries[this.timeseries.length - 1].value - this.timeseries[0].value : null;
        },

        async init() {
          if (!auth.isLoggedIn()) {
            window.location.href = 'login.html';
            return;
          }
          try {
            const me = await apiFetch('/auth/me');
            this.user = me.user;
            this.organization = me.organization;
            this.isPlatformAdmin = me.user.role === 'platform_admin';
            this.isManager = me.user.role === 'manager';
            if (!this.isPlatformAdmin) {
              const calls = [apiFetch('/target-profiles'), apiFetch('/leads')];
              if (this.isManager) calls.push(apiFetch('/dashboard/kpis'));
              const [profiles, leads, kpis] = await Promise.all(calls);
              this.targetProfiles = profiles.targetProfiles;
              this.leads = leads.leads;
              if (kpis) this.kpis = kpis;
            }
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loading = false;
          }
        },

        async toggleMetric(key) {
          if (this.expandedMetric === key) {
            this.expandedMetric = null;
            if (this.chartInstance) {
              this.chartInstance.destroy();
              this.chartInstance = null;
            }
            return;
          }
          this.expandedMetric = key;
          this.metricRange = '30d';
          await this.loadDetail();
        },

        async selectRange(range) {
          this.metricRange = range;
          await this.loadTimeseries();
        },

        async loadDetail() {
          this.loadingDetail = true;
          try {
            const [ts, bd] = await Promise.all([
              apiFetch(`/dashboard/timeseries?metric=${this.expandedMetric}&range=${this.metricRange}`),
              apiFetch(`/dashboard/breakdown?metric=${this.expandedMetric}`),
            ]);
            this.timeseries = ts.series;
            this.breakdown = bd.breakdown;
            this.renderChart();
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loadingDetail = false;
          }
        },

        async loadTimeseries() {
          this.loadingDetail = true;
          try {
            const ts = await apiFetch(`/dashboard/timeseries?metric=${this.expandedMetric}&range=${this.metricRange}`);
            this.timeseries = ts.series;
            this.renderChart();
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loadingDetail = false;
          }
        },

        formatBucketLabel(iso) {
          const d = new Date(iso);
          if (this.metricRange === '1d') return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
          if (this.metricRange === '7d' || this.metricRange === '30d') return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
          return d.toLocaleDateString('de-DE', { month: 'short', year: '2-digit' });
        },

        renderChart() {
          if (this.chartInstance) this.chartInstance.destroy();
          const canvas = this.$refs.metricChart;
          if (!canvas) return;

          const primary = getComputedStyle(document.documentElement).getPropertyValue('--color-primary').trim();
          this.chartInstance = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: {
              labels: this.timeseries.map((point) => this.formatBucketLabel(point.date)),
              datasets: [
                {
                  data: this.timeseries.map((point) => point.value),
                  borderColor: primary,
                  backgroundColor: primary + '1a',
                  borderWidth: 2,
                  pointRadius: 0,
                  pointHoverRadius: 4,
                  pointHitRadius: 14,
                  tension: 0.3,
                  fill: true,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              interaction: { mode: 'index', intersect: false },
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: '#ffffff',
                  titleColor: '#111827',
                  bodyColor: '#111827',
                  borderColor: '#e5e7eb',
                  borderWidth: 1,
                  padding: 10,
                  boxWidth: 10,
                  boxHeight: 2,
                },
              },
              scales: {
                y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: '#f0f1f3' } },
                x: { grid: { display: false } },
              },
            },
          });
        },

        logout() {
          auth.clearToken();
          window.location.href = 'login.html';
        },
      };
    }
  </script>
</body>
</html>
