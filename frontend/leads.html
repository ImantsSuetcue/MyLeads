<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads - MyLeads</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/api.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div class="app-shell" x-data="leadsPage()" x-init="init()">
    <aside class="sidebar">
      <div>
        <div class="sidebar-brand">MyLeads</div>
        <nav class="sidebar-nav">
          <a href="dashboard.html">Dashboard</a>
          <a href="app.html">Suchanfragen</a>
          <a href="leads.html">Leads</a>
          <a href="team.html">Team</a>
          <a href="settings.html">Einstellungen</a>
        </nav>
      </div>
      <div class="sidebar-footer">
        <span class="user-email" x-text="user && user.email"></span>
        <button class="btn-ghost" style="width:100%;" @click="logout()">Logout</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="page">
        <h1>Leads</h1>
        <p class="subtitle">Alle Leads deiner Firma, über alle Zielprofile hinweg.</p>

        <div class="error-box" x-show="error" x-text="error"></div>

        <template x-if="loading">
          <div class="card"><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div></div>
        </template>

        <template x-if="!loading">
          <div>
            <div class="search-bar">
              <input type="text" placeholder="Firma, Person oder E-Mail suchen…" x-model="searchQuery" />
              <select x-model="fitFilter">
                <option value="">Alle Fit-Kategorien</option>
                <option value="high">Hohe Passung</option>
                <option value="medium">Mittlere Passung</option>
                <option value="low">Geringe Passung</option>
              </select>
              <select x-model="statusFilter">
                <option value="">Alle Status</option>
                <option value="new">Neu</option>
                <option value="contacted">Kontaktiert</option>
                <option value="qualified">Qualifiziert</option>
                <option value="proposal">Angebot</option>
                <option value="won">Gewonnen</option>
                <option value="lost">Verloren</option>
              </select>
            </div>

            <p class="subtitle" x-show="!leads.length">Noch keine Leads vorhanden. Starte eine Suche unter "Suchanfragen".</p>

            <div class="card data-table-wrap" x-show="leads.length">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Firma</th>
                    <th>Person</th>
                    <th>Zielprofil</th>
                    <th>E-Mail</th>
                    <th>Fit</th>
                    <th>Status</th>
                    <th>Datum</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="lead in filteredLeads" :key="lead.id">
                    <tr class="clickable" @click="openLead(lead)">
                      <td>
                        <strong x-text="lead.company_name"></strong><br />
                        <span class="plan-meta" x-text="lead.company_domain"></span>
                      </td>
                      <td x-text="(lead.first_name || '') + ' ' + (lead.last_name || '')"></td>
                      <td x-text="lead.target_profile_name || '–'"></td>
                      <td x-text="lead.email || '–'"></td>
                      <td><span class="badge" :class="'badge-fit-' + (lead.score || 'none')" x-text="lead.score || '–'"></span></td>
                      <td><span class="badge" :class="'badge-status-' + lead.status" x-text="lead.status"></span></td>
                      <td x-text="lead.created_at"></td>
                    </tr>
                  </template>
                  <tr x-show="leads.length && !filteredLeads.length">
                    <td colspan="7" class="subtitle" style="text-align:center;">Keine Leads passen zu diesem Filter.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <script src="js/sidebar.js"></script>
  <script>
    function leadsPage() {
      return {
        user: null,
        leads: [],
        loading: true,
        error: '',
        searchQuery: '',
        fitFilter: '',
        statusFilter: '',

        get filteredLeads() {
          const q = this.searchQuery.trim().toLowerCase();
          return this.leads.filter((lead) => {
            if (this.fitFilter && lead.score !== this.fitFilter) return false;
            if (this.statusFilter && lead.status !== this.statusFilter) return false;
            if (!q) return true;
            const haystack = [lead.company_name, lead.first_name, lead.last_name, lead.email]
              .filter(Boolean)
              .join(' ')
              .toLowerCase();
            return haystack.includes(q);
          });
        },

        async init() {
          if (!auth.isLoggedIn()) {
            window.location.href = 'login.html';
            return;
          }
          try {
            const me = await apiFetch('/auth/me');
            this.user = me.user;
            if (me.user.role === 'platform_admin') {
              this.error = 'Platform-Admins haben keine firmenbezogenen Leads.';
              return;
            }
            const data = await apiFetch('/leads');
            this.leads = data.leads;
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loading = false;
          }
        },

        openLead(lead) {
          window.location.href = `lead-detail.html?profileId=${lead.target_profile_id}&leadId=${lead.id}`;
        },

        logout() {
          auth.clearToken();
          window.location.href = 'login.html';
        },
      };
    }
  </script>
</body>
</html>
